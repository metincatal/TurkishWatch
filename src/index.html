<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Türkçe Kelime Saat</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Tema şeridi - saatin üstündeki karanlık alanda -->
        <div class="theme-strip" id="themeStrip"></div>

        <div class="clock-stone" id="clockStone">
            <div class="stone-edge edge-top"></div>
            <div class="stone-edge edge-right"></div>
            <div class="stone-edge edge-bottom"></div>
            <div class="stone-edge edge-left"></div>
            <div class="stone-surface">
                <div class="stone-shine"></div>
                <div id="grid" class="grid"></div>
                <div class="dots-row">
                    <span class="dot" id="dot-1"></span>
                    <span class="dot" id="dot-2"></span>
                    <span class="dot" id="dot-3"></span>
                    <span class="dot" id="dot-4"></span>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            <input type="time" id="timeInput" step="60" title="Zamanı değiştir">
            <!-- Mobil drum picker -->
            <div class="drum-picker" id="drumPicker">
                <div class="drum-col" id="drumHrCol">
                    <div class="drum-scroller" id="drumHrScroller"></div>
                </div>
                <span class="drum-colon">:</span>
                <div class="drum-col" id="drumMinCol">
                    <div class="drum-scroller" id="drumMinScroller"></div>
                </div>
                <div class="drum-line"></div>
            </div>
        </div>
    </div>

    <!-- Görsel Tam Ekran -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <img id="lightboxImg" src="" alt="">
        <div class="lightbox-label" id="lightboxLabel"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
