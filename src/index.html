<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Türkçe Kelime Saat</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="clock-frame">
            <div class="dot corner-dot top-left" id="dot-1"></div>
            <div class="dot corner-dot top-right" id="dot-2"></div>
            <div class="dot corner-dot bottom-left" id="dot-3"></div>
            <div class="dot corner-dot bottom-right" id="dot-4"></div>
            <div class="clock-surface">
                <div id="grid" class="grid"></div>
            </div>
        </div>

        <div class="bottom-bar">
            <input type="time" id="timeInput" step="60" title="Zamanı değiştir">
            <button class="themes-btn" id="themesBtn">Temalar</button>
        </div>
    </div>

    <!-- Tema Modalı -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2>Temalar</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="gallery" id="gallery"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
